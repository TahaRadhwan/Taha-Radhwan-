<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مكتب طه رضوان للتخليص الجمركي والخدمات اللوجستية</title>
    
    <!-- وسم PWA والهواتف الذكية -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#059669" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="طه رضوان" />
    <link rel="apple-touch-icon" href="/src/assets/images/logo_icon_1784393762345.jpg" />
    <meta name="description" content="اللوحة السحابية لإدارة وتخليص الشحنات الجمركية والترانزيت بالجمهورية اليمنية" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- تسجيل ملف الخدمة للتحول إلى PWA وتوفير العمل بدون إنترنت -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('PWA: Service Worker registered successfully with scope:', registration.scope);
            })
            .catch((error) => {
              console.error('PWA: Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
